name: sync-upstream-rules

on:
  schedule:
    # 每天 UTC 01:30（北京时间 09:30）同步上游快照并重建 dist
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-upstream-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync upstream snapshots
        run: python tools/sync_upstream_rules.py

      - name: Build dist
        run: python tools/build_rules.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/upstream dist
          git commit -m "sync: upstream rules and rebuild dist"
          git push
