name: sync-upstream-rules

on:
  schedule:
    # 每天 UTC 01:30（北京时间 09:30）同步上游快照并重建 dist
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-upstream-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: upstream-sync
    env:
      RULEMESH_ALICLOUD_ACCESS_KEY_ID: ${{ secrets.RULEMESH_ALICLOUD_ACCESS_KEY_ID }}
      RULEMESH_ALICLOUD_ACCESS_KEY_SECRET: ${{ secrets.RULEMESH_ALICLOUD_ACCESS_KEY_SECRET }}
      RULEMESH_ALICLOUD_SECURITY_TOKEN: ${{ secrets.RULEMESH_ALICLOUD_SECURITY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 同步上游快照
        run: python tools/sync_upstream_rules.py

      - name: 构建 dist
        run: python tools/build_rules.py

      - name: 若有变更则提交并推送
        run: |
          if git diff --quiet; then
            echo "无变更"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/upstream dist
          git commit -m "sync: upstream rules and rebuild dist"
          git push
