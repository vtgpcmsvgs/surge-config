name: build-dist

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: upstream-sync
    env:
      RULEMESH_ALICLOUD_ACCESS_KEY_ID: ${{ secrets.RULEMESH_ALICLOUD_ACCESS_KEY_ID }}
      RULEMESH_ALICLOUD_ACCESS_KEY_SECRET: ${{ secrets.RULEMESH_ALICLOUD_ACCESS_KEY_SECRET }}
      RULEMESH_ALICLOUD_SECURITY_TOKEN: ${{ secrets.RULEMESH_ALICLOUD_SECURITY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 同步上游快照
        run: python tools/sync_upstream_rules.py

      - name: 构建 dist
        run: python tools/build_rules.py

      - name: 上传 dist 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: 若 dist 有变更则提交
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- rules/upstream dist; then
            echo "rules/upstream 与 dist 无变更"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/upstream dist
          git commit -m "chore: sync upstream rules and rebuild dist"
          git push
