name: build-dist

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行单元测试
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: 构建 dist
        run: python -B tools/build_rules.py

      - name: 准备共享 GeoIP 资产
        run: python -B tools/fetch_geoip_asset.py --output .github/tmp/geoip/country.mmdb

      - name: 发布共享 GeoIP Release 资产
        if: github.ref == 'refs/heads/main'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: .github/tmp/geoip/country.mmdb
          asset_name: country.mmdb
          tag: geoip-country-mmdb
          overwrite: true
          release_name: RuleMesh Shared GeoIP
          body: |
            RuleMesh 共享 GeoIP 镜像产物。
            上游选择与维护边界见 rules/upstream/geodata/metacubex_country_mmdb.yaml。

      - name: 上传 dist 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: 自动提交 dist 构建产物
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- dist; then
            echo "dist 无需更新"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "build: rebuild dist"
          git push
