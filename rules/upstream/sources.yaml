# 上游来源登记
# 说明：
# 1. 第三方只作为 rules/upstream/ 快照来源，由 GitHub Actions 每日同步。
# 2. 真正给客户端使用的内容，请始终走 dist/。
# 3. rules/ 源文件中的手写规则优先，后续通过 INCLUDE 追加第三方快照。

sources:
  reject:
    reject.list:
      preferred:
        - repo: self
          note: 保留本仓库自维护的禁用 HTTP、Windows 更新、WPS 广告等强主观规则
    adblock.list:
      preferred:
        - repo: self
          note: 广告拦截继续保持小而可读，不引入额外大体量上游

  direct:
    cn_direct.list:
      preferred:
        - repo: self
          note: 保留 DOMAIN-SUFFIX,cn 与 GEOIP,CN 等高优先级兜底
        - repo: Loyalsoldier/surge-rules
          note: 负责 direct.txt 与 cncidr.txt，尽量保证国内站点直连
        - repo: ACL4SSR/ACL4SSR
          note: 负责 ChinaDomain、ChinaMedia、Download、UnBan 作为补充
    microsoft_direct.list:
      preferred:
        - repo: self
          note: 保留 OneDrive 进程规则在最前面
        - repo: ACL4SSR/ACL4SSR
          note: 负责 Microsoft.list 与 OneDrive.list 主体
    bytedance_direct.list:
      preferred:
        - repo: self
          note: 当前继续以本仓库小范围关键词为主
    netease_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: ACL4SSR/ACL4SSR
          note: 负责 NetEaseMusic.list 补充
    bilibili_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: ACL4SSR/ACL4SSR
          note: 负责 Bilibili.list 与 BilibiliHMT.list 补充
    direct.list:
      preferred:
        - repo: self
          note: 保留你自己的通用直连补充与特殊端口 / ASN 规则

  proxy:
    proxy.list:
      preferred:
        - repo: self
          note: 放需要走默认代理组的小范围自定义规则
    google.list:
      preferred:
        - repo: self
          note: 保留少量关键词兜底
        - repo: ACL4SSR/ACL4SSR
          note: 负责 GoogleFCM.list 与 YouTube.list 补充
    telegram.list:
      preferred:
        - repo: self
          note: 保留域名入口在高优先级
        - repo: Loyalsoldier/surge-rules
          note: 负责 telegramcidr.txt 补充
    gfw.list:
      preferred:
        - repo: self
          note: 保留少量高频站点在高优先级
        - repo: Loyalsoldier/surge-rules
          note: 负责 gfw.txt 与 tld-not-cn.txt 主体
        - repo: ACL4SSR/ACL4SSR
          note: 负责 ProxyGFWlist.list 作为额外补充
    global_media.list:
      preferred:
        - repo: self
          note: 保留少量常用流媒体入口
        - repo: ACL4SSR/ACL4SSR
          note: 负责 ProxyMedia.list 与 Netflix.list 主体

  region:
    hk/domains_to_hk.list:
      preferred:
        - repo: self
          note: 当前是你自己的香港策略入口
    tw/ai_tw.list:
      preferred:
        - repo: self
          note: 保留少量关键词兜底
        - repo: ACL4SSR/ACL4SSR
          note: 负责 OpenAi.list 补充
    tw/crypto_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾加密货币站点入口
    tw/domains_to_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾地区解锁入口
    tw/google_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的 Google -> TW 路由入口
    jp/domains_to_jp.list:
      preferred:
        - repo: self
          note: 当前是你自己的日本策略入口
    jp/jp_socks5_ipcidr.list:
      preferred:
        - repo: self
          note: 当前是你自己维护的日本 SOCKS5 端点 CIDR

  device:
    srcip_pc01.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc02.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc03.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc04.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc05.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc06.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
