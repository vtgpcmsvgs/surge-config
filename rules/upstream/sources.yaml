# 上游来源登记
# 说明：
# 1. 这里只记录“建议参考哪里”，不在当前脚本里自动拉取。
# 2. 真正给客户端使用的内容，请始终走 dist/。

sources:
  reject:
    reject.list:
      preferred:
        - repo: self
          note: 保留当前仓库自维护的禁用 HTTP、Windows 更新、WPS 广告规则
        - repo: blackmatrix7/ios_rule_script
          note: 可作为更大体量 reject / ad block 素材参考
    adblock.list:
      preferred:
        - repo: blackmatrix7/ios_rule_script
          note: 广告域名类素材较全，适合补充域名级拦截
        - repo: Loyalsoldier/surge-rules
          note: 可参考 reject / private 相关规则集的维护方式

  direct:
    cn_direct.list:
      preferred:
        - repo: Loyalsoldier/surge-rules
          note: 适合参考 cncidr、direct、apple、icloud 等基础直连素材
        - repo: ACL4SSR/ACL4SSR
          note: 适合参考 ChinaDomain、ChinaMedia、Download、UnBan 等补充
    microsoft_direct.list:
      preferred:
        - repo: ACL4SSR/ACL4SSR
          note: 当前初版来源快照主要参考 Microsoft.list 与 OneDrive.list
        - repo: blackmatrix7/ios_rule_script
          note: 可用于校对 Microsoft / OneDrive 相关分流
    bytedance_direct.list:
      preferred:
        - repo: self
          note: 当前以本仓库小范围关键词为主
        - repo: blackmatrix7/ios_rule_script
          note: 可参考 ByteDance 分类素材
    netease_direct.list:
      preferred:
        - repo: ACL4SSR/ACL4SSR
          note: 可参考 NetEaseMusic.list
    bilibili_direct.list:
      preferred:
        - repo: ACL4SSR/ACL4SSR
          note: 可参考 Bilibili.list 与 BilibiliHMT.list
    direct.list:
      preferred:
        - repo: self
          note: 保留你自己的通用直连补充与特殊端口 / ASN 规则

  proxy:
    proxy.list:
      preferred:
        - repo: self
          note: 放需要走默认代理组的小范围自定义规则
    google.list:
      preferred:
        - repo: ACL4SSR/ACL4SSR
          note: 可参考 GoogleFCM、YouTube 等规则集
    telegram.list:
      preferred:
        - repo: Loyalsoldier/surge-rules
          note: 适合参考 telegramcidr
        - repo: ACL4SSR/ACL4SSR
          note: 适合参考 Telegram.list
    gfw.list:
      preferred:
        - repo: Loyalsoldier/surge-rules
          note: 适合参考 gfw、tld-not-cn、proxy
        - repo: ACL4SSR/ACL4SSR
          note: 适合参考 ProxyGFWlist.list
    global_media.list:
      preferred:
        - repo: ACL4SSR/ACL4SSR
          note: 适合参考 ProxyMedia.list、Netflix.list 等流媒体素材

  region:
    hk/domains_to_hk.list:
      preferred:
        - repo: self
          note: 当前是你自己的香港策略入口
    tw/ai_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾策略入口
        - repo: ACL4SSR/ACL4SSR
          note: 可参考 OpenAi.list 等 AI 平台素材
    tw/crypto_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾加密货币站点入口
    tw/domains_to_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾地区解锁入口
    tw/google_tw:
      preferred:
        - repo: self
          note: 当前是你自己的 Google -> TW 路由入口
    jp/domains_to_jp.list:
      preferred:
        - repo: self
          note: 当前是你自己的日本策略入口
    jp/jp_socks5_ipcidr.list:
      preferred:
        - repo: self
          note: 当前是你自己维护的日本 SOCKS5 端点 CIDR

  device:
    srcip_pc01.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc02.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc03.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc04.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc05.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc06.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
