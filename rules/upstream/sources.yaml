# 上游来源登记
# 说明：
# 1. 第三方只作为 rules/upstream/ 快照来源，由 GitHub Actions 每日同步。
# 2. 真正给客户端使用的内容，请始终走 dist/。
# 3. rules/ 源文件中的手写规则优先，后续通过 INCLUDE 追加第三方快照。

sources:
  reject:
    reject.list:
      preferred:
        - repo: self
          note: 保留本仓库自维护的禁用 HTTP、Windows 更新、WPS 广告等强主观规则
    adblock.list:
      preferred:
        - repo: self
          note: 广告拦截继续保持小而可读，不引入额外大体量上游

  direct:
    cn_direct.list:
      preferred:
        - repo: self
          note: 保留 DOMAIN-SUFFIX,cn 与 GEOIP,CN 等高优先级兜底
        - repo: Loyalsoldier/surge-rules
          note: 负责 direct.txt 与 cncidr.txt，尽量保证国内站点直连
    microsoft_direct.list:
      preferred:
        - repo: self
          note: 保留 OneDrive 进程规则在最前面
        - repo: blackmatrix7/ios_rule_script
          note: 负责 Microsoft.list 与 OneDrive.list 主体
    bytedance_direct.list:
      preferred:
        - repo: self
          note: 保留源层入口，仅通过 INCLUDE 组装上游快照
        - repo: blackmatrix7/ios_rule_script
          note: 负责 ByteDance.list 与 DouYin.list 主体，持续同步
    netease_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 NetEaseMusic.list 补充
    bilibili_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 Bilibili.list 补充
  proxy:
    google.list:
      preferred:
        - repo: self
          note: 保留少量关键词兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 GoogleFCM.list 与 YouTube.list 补充
    telegram.list:
      preferred:
        - repo: self
          note: 保留域名入口在高优先级
        - repo: Loyalsoldier/surge-rules
          note: 负责 telegramcidr.txt 补充
    gfw.list:
      preferred:
        - repo: self
          note: 保留少量高频站点在高优先级
        - repo: Loyalsoldier/surge-rules
          note: 负责 gfw.txt 与 tld-not-cn.txt 主体
    global_media.list:
      preferred:
        - repo: self
          note: 保留少量常用流媒体入口
        - repo: blackmatrix7/ios_rule_script
          note: 负责 GlobalMedia.list 主体

  region:
    tw/ai_tw.list:
      preferred:
        - repo: self
          note: 保留少量关键词兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 OpenAI.list 补充
    tw/crypto_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾加密货币站点入口
    tw/domains_to_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的台湾地区解锁入口
    tw/google_tw.list:
      preferred:
        - repo: self
          note: 当前是你自己的 Google -> TW 路由入口
    jp/domains_to_jp.list:
      preferred:
        - repo: self
          note: 当前是你自己的日本策略入口
    jp/jp_socks5_ipcidr.list:
      preferred:
        - repo: self
          note: 当前是你自己维护的日本 SOCKS5 端点 CIDR

    hk/aws_ipv4.list:
      preferred:
        - repo: self
          note: Keep a stable source-layer INCLUDE for AWS Hong Kong IPv4 rules.
        - repo: AWS ip-ranges.json
          note: Sync all ap-east-1 IPv4 prefixes daily into rules/upstream/aws/hk_ipv4.txt
    jp/tokyo_aws_ipv4.list:
      preferred:
        - repo: self
          note: Keep a stable source-layer INCLUDE for AWS Tokyo IPv4 rules.
        - repo: AWS ip-ranges.json
          note: Sync all ap-northeast-1 IPv4 prefixes daily into rules/upstream/aws/tokyo_ipv4.txt
    jp/osaka_aws_ipv4.list:
      preferred:
        - repo: self
          note: Keep a stable source-layer INCLUDE for AWS Osaka IPv4 rules.
        - repo: AWS ip-ranges.json
          note: Sync all ap-northeast-3 IPv4 prefixes daily into rules/upstream/aws/osaka_ipv4.txt
    kr/seoul_aws_ipv4.list:
      preferred:
        - repo: self
          note: Keep a stable source-layer INCLUDE for AWS Seoul IPv4 rules.
        - repo: AWS ip-ranges.json
          note: Sync all ap-northeast-2 IPv4 prefixes daily into rules/upstream/aws/seoul_ipv4.txt
    tw/aws_ipv4.list:
      preferred:
        - repo: self
          note: Keep a stable source-layer INCLUDE for AWS Taiwan IPv4 rules.
        - repo: AWS ip-ranges.json
          note: Sync all ap-east-2 IPv4 prefixes daily into rules/upstream/aws/taiwan_ipv4.txt

  device:
    srcip_pc01.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc02.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc03.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc04.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc05.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
    srcip_pc06.list:
      preferred:
        - repo: self
          note: 来自当前局域网设备源地址映射
