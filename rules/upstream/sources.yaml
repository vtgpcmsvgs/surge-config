# 上游来源登记
# 说明：
# 1. 第三方只作为 rules/upstream/ 快照来源，由 GitHub Actions 每日同步。
# 2. 真正给客户端使用的内容，请始终走 dist/。
# 3. rules/ 源文件中的手写规则优先，后续通过 INCLUDE 叠加第三方快照。

sources:
  reject:
    adspower_reject.list:
      preferred:
        - repo: self
          note: AdsPower 专项拒绝规则由 rules/app/adspower.txt 单一主清单派生，统一维护隐私追踪与可安全阻断端点
    plain_http_reject.list:
      preferred:
        - repo: self
          note: 保留仅浏览器进程禁止明文 HTTP 出站规则，继续本地维护
    os_update_reject.list:
      preferred:
        - repo: self
          note: Windows + Apple 更新禁用规则，保持小而稳定，不引入上游
    wps_reject.list:
      preferred:
        - repo: self
          note: 只保留低误伤的 WPS 广告、统计与付费提示子域名
        - repo: privacy-protection-tools/anti-AD
          note: 提供 WPS 广告与统计子域名候选，按低误伤原则人工筛选
        - repo: blackmatrix7/ios_rule_script
          note: 使用 AdGuard 相关规则作交叉验证
    adblock_reject.list:
      preferred:
        - repo: self
          note: 广告拦截继续保持小而可读，不引入额外大体量上游

  direct:
    adspower_direct.list:
      preferred:
        - repo: self
          note: AdsPower 专项直连规则由 rules/app/adspower.txt 单一主清单派生，承接代理检测与网络环境测试放行
    cn_direct.list:
      preferred:
        - repo: self
          note: 保留 DOMAIN-SUFFIX,cn 与 GEOIP,CN 等高优先级兜底
        - repo: Loyalsoldier/surge-rules
          note: 负责 direct.txt 与 cncidr.txt，尽量保证国内站点直连
    alicloud_hk_ssh_direct.list:
      preferred:
        - repo: self
          note: 保持阿里云香港 SSH TCP/22 直连入口稳定，源规则只保留单一 INCLUDE
        - repo: Alibaba Cloud DescribePublicIpAddress
          note: 每日同步 cn-hongkong 的全部公网 IPv4 前缀到 rules/upstream/alicloud/hk_ipv4.txt，并派生 SSH 22 直连规则到 rules/upstream/alicloud/hk_ssh22.txt
    microsoft_direct.list:
      preferred:
        - repo: self
          note: 保留 OneDrive 进程规则放在最前面
        - repo: blackmatrix7/ios_rule_script
          note: 负责 Microsoft.list 与 OneDrive.list 主体
    macos_update_direct.list:
      preferred:
        - repo: self
          note: 仅保留 Apple 官方标注为 macOS only 的系统更新主机，便于与 os_update_reject 配套切换
        - repo: Apple Support
          note: 参考《Use Apple products on enterprise networks》的 Software updates 清单，只挑选 macOS only 项
    bytedance_direct.list:
      preferred:
        - repo: self
          note: 保留源层入口，仅通过 INCLUDE 组装上游快照
        - repo: blackmatrix7/ios_rule_script
          note: 负责 ByteDance.list 与 DouYin.list 主体，持续同步
    netease_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 NetEaseMusic.list 补充
    bilibili_direct.list:
      preferred:
        - repo: self
          note: 保留少量高频兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 Bilibili.list 补充
    github_ssh_direct.list:
      preferred:
        - repo: self
          note: 保持 GitHub 仓库 SSH carve-out 入口极小且稳定，只覆盖明确的 SSH 连接端点
        - repo: GitHub Docs
          note: 参考 github.com:22 与 ssh.github.com:443 的 SSH 接入说明，避免把网页流量误放直连
  proxy:
    adspower_proxy.list:
      preferred:
        - repo: self
          note: AdsPower 专项节点选择规则由 rules/app/adspower.txt 单一主清单派生，承接必须走代理的核心服务
    onepassword_proxy.list:
      preferred:
        - repo: self
          note: 1Password 重度用户专项节点选择入口，源文件只保留单一 INCLUDE
        - repo: 1Password Support
          note: 通过官方《1Password ports and domains》每日抓取核心一方域名与更新/基础设施端点，保守排除第三方集成域名
    polygon_rpc_proxy.list:
      preferred:
        - repo: self
          note: Polygon 主网 RPC 域名专项节点选择入口，统一收敛根域名与通配符子域名，避免继续散落在客户端配置里手写
    google_public_dns_ipv4_proxy.list:
      preferred:
        - repo: self
          note: Google Public DNS 主 IPv4 端点专项节点选择入口，当前只精确匹配 8.8.8.8/32，不再绑定单一端口
    gfw.list:
      preferred:
        - repo: self
          note: 保留少量高频站点在高优先级
        - repo: Loyalsoldier/surge-rules
          note: 负责 gfw.txt 与 tld-not-cn.txt 主体

  region:
    hk/global_media.list:
      preferred:
        - repo: self
          note: 统一走香港区域策略，香港节点通常更稳更快，流媒体内容与支付方式也更友好
        - repo: blackmatrix7/ios_rule_script
          note: 负责 GlobalMedia.list 主体
    hk/telegram.list:
      preferred:
        - repo: self
          note: 统一走香港区域策略，适合 Telegram 大流量场景
        - repo: Loyalsoldier/surge-rules
          note: 负责 telegramcidr.txt 补充
    tw/ai_tw.list:
      preferred:
        - repo: self
          note: 保留少量关键词兜底
        - repo: blackmatrix7/ios_rule_script
          note: 负责 OpenAI.list 补充
    tw/crypto_tw.list:
      preferred:
        - repo: self
          note: 保持单文件入口稳定，承接本地补充，如 g42.ai、预测市场与新增 DeFi/分析站点
        - repo: blackmatrix7/ios_rule_script
          note: 负责 Cryptocurrency.list 主体，通过 INCLUDE 并入该文件
    tw/google_tw.list:
      preferred:
        - repo: self
          note: Google 相关服务，含 Play、Gemini、YouTube 与 FCM，统一走台湾入口
        - repo: blackmatrix7/ios_rule_script
          note: 负责 GoogleFCM.list 与 YouTube.list 补充，通过 INCLUDE 并入该文件
    jp/domains_to_jp.list:
      preferred:
        - repo: self
          note: 当前是你自己维护的日本策略入口
    jp/jp_socks5_ipcidr.list:
      preferred:
        - repo: self
          note: 当前是你自己维护的日本 SOCKS5 端点 CIDR

    hk/aws_ipv4.list:
      preferred:
        - repo: self
          note: 保持源规则层 AWS 香港 IPv4 的单一 INCLUDE 入口稳定
        - repo: AWS ip-ranges.json
          note: 每日同步全部 ap-east-1 IPv4 前缀到 rules/upstream/aws/hk_ipv4.txt
    jp/tokyo_aws_ipv4.list:
      preferred:
        - repo: self
          note: 保持源规则层 AWS 东京 IPv4 的单一 INCLUDE 入口稳定
        - repo: AWS ip-ranges.json
          note: 每日同步全部 ap-northeast-1 IPv4 前缀到 rules/upstream/aws/tokyo_ipv4.txt
    jp/osaka_aws_ipv4.list:
      preferred:
        - repo: self
          note: 保持源规则层 AWS 大阪 IPv4 的单一 INCLUDE 入口稳定
        - repo: AWS ip-ranges.json
          note: 每日同步全部 ap-northeast-3 IPv4 前缀到 rules/upstream/aws/osaka_ipv4.txt
    kr/seoul_aws_ipv4.list:
      preferred:
        - repo: self
          note: 保持源规则层 AWS 首尔 IPv4 的单一 INCLUDE 入口稳定
        - repo: AWS ip-ranges.json
          note: 每日同步全部 ap-northeast-2 IPv4 前缀到 rules/upstream/aws/seoul_ipv4.txt
    tw/taipei_aws_ipv4.list:
      preferred:
        - repo: self
          note: 保持源规则层 AWS 台北 IPv4 的单一 INCLUDE 入口稳定
        - repo: AWS ip-ranges.json
          note: 每日同步全部 ap-east-2 IPv4 前缀到 rules/upstream/aws/taipei_ipv4.txt
