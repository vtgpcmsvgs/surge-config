# 上游合并模板
# 当前实现已经从“手工拷贝合并”切换为“手写规则 + INCLUDE 上游快照”。

defaults:
  dedupe: true
  keep_comments: false
  normalize:
    trim_whitespace: true
    drop_blank_lines: true
  output_policy:
    source_layer_only: true
    client_layer_via_dist: true
  sync_policy:
    fetch_to_rules_upstream: true
    source_files_use_include: true
    manual_entries_first: true

merge_plan:
  - id: adspower-direct
    target: rules/direct/adspower_direct.list
    purpose: AdsPower 代理检测与网络环境测试直连放行
    strategy:
      - generated_from_rules_app_adspower_manifest
      - keep_single_source_of_truth
    notes:
      - 统一由 rules/app/adspower.txt 维护，不直接手改该源文件
      - adspower.com 与 adspower.net 在主清单中必须成对出现

  - id: cn-direct
    target: rules/direct/cn_direct.list
    purpose: 中国大陆基础直连兜底，尽量避免国内站点误走代理
    strategy:
      - include_loyalsoldier_first_then_local_cn_fallback
      - include_loyalsoldier_direct_and_cncidr

  - id: microsoft-direct
    target: rules/direct/microsoft_direct.list
    purpose: Microsoft / OneDrive 直连
    strategy:
      - include_blackmatrix7_first_then_local_process_fallback
      - include_blackmatrix7_onedrive_and_microsoft

  - id: os-time-direct
    target: rules/direct/os_time_direct.list
    purpose: 操作系统时间同步直连
    strategy:
      - manual_only
      - keep_scope_small_and_stable
      - match_only_official_time_hosts
    notes:
      - Windows 独立设备默认时间源使用 time.windows.com；域成员通常跟随域时间层级，这里不扩展到域控体系
      - Apple 官方示例与企业网络文档包含 time.apple.com 与 time-macos.apple.com；两者统一保留
      - 时间同步更依赖原生链路对称性，默认保持 DIRECT，不并入节点选择

  - id: macos-update-direct
    target: rules/direct/macos_update_direct.list
    purpose: macOS 系统更新直连
    strategy:
      - manual_only
      - keep_scope_small_and_stable
    notes:
      - 仅保留 Apple 官方标注为 macOS only 的系统更新主机，避免把 App Store / Apple TV 等其他 Apple 服务误放直连
      - 设计为与 reject/os_update_reject 配套使用；需要升级 macOS 时，可临时注释对应 reject 入口后命中这里

  - id: bilibili-direct
    target: rules/direct/bilibili_direct.list
    purpose: Bilibili 直连
    strategy:
      - include_upstream_first_then_local_domain_fallback
      - include_blackmatrix7_bilibili

  - id: bytedance-direct
    target: rules/direct/bytedance_direct.list
    purpose: 字节系直连
    strategy:
      - keep_source_file_as_include_entry
      - include_blackmatrix7_bytedance_and_douyin

  - id: netease-direct
    target: rules/direct/netease_direct.list
    purpose: 网易直连
    strategy:
      - include_upstream_first_then_local_domain_fallback
      - include_blackmatrix7_netease_music

  - id: alicloud-hk-ipv4-ssh22-direct
    target: rules/direct/alicloud_hk_ipv4_ssh22_direct.list
    purpose: 阿里云香港 IPv4 派生 SSH TCP/22 直连入口
    strategy:
      - keep_source_file_as_single_include
      - sync_alicloud_cn_hongkong_ipv4_daily_via_official_openapi
      - derive_ssh_tcp_22_rules_from_official_ipv4_prefixes
    notes:
      - 数据源为阿里云官方 VPC OpenAPI DescribePublicIpAddress
      - 公开入口直接保留 SSH TCP/22 最终语义，不要求客户端额外拼接端口条件
      - 首次同步需要具备该接口读取权限的 AccessKey 或 STS 临时凭证

  - id: github-ssh-direct
    target: rules/direct/github_ssh_direct.list
    purpose: GitHub 仓库 SSH 定向直连
    strategy:
      - manual_only
      - keep_scope_small_and_stable
      - match_only_github_ssh_endpoints
    notes:
      - 仅覆盖 github.com:22 与 ssh.github.com:443
      - 客户端顺序必须放在 proxy/gfw 前
  - id: google-tw
    target: rules/region/tw/google_tw.list
    purpose: Google / YouTube / Gemini 统一走台湾策略
    strategy:
      - include_upstream_first_then_local_keyword_fallback
      - include_blackmatrix7_google_and_youtube
    notes:
      - Google 通用规则主维护在 rules/region/tw/google_tw.list，避免 proxy 与 region 双入口分叉
      - Gemini / AI Studio / NotebookLM 允许在 rules/region/tw/ai_tw.list 保留 AI 视角交叉兜底，但 google_tw 仍应排在 ai_tw 前

  - id: hk-telegram
    target: rules/region/hk/telegram.list
    purpose: Telegram 走香港区域策略
    strategy:
      - include_upstream_first_then_local_domain_fallback
      - include_loyalsoldier_telegram_cidr
    notes:
      - 香港节点通常更稳定、速度更快，适合 Telegram 大流量场景
      - 香港地区内容生态与支付方式也更友好

  - id: gfw-proxy
    target: rules/proxy/gfw.list
    purpose: GFW 代理兜底
    strategy:
      - include_upstream_first_then_local_core_fallback
      - include_loyalsoldier_gfw_and_tld_not_cn

  - id: adspower-proxy
    target: rules/proxy/adspower_proxy.list
    purpose: AdsPower 必须走节点选择的核心服务
    strategy:
      - generated_from_rules_app_adspower_manifest
      - keep_single_source_of_truth
    notes:
      - 统一由 rules/app/adspower.txt 维护，不直接手改该源文件
      - 规则顺序应先于 proxy/gfw，避免被广谱代理入口吞没

  - id: onepassword-proxy
    target: rules/proxy/onepassword_proxy.list
    purpose: 1Password 核心连接节点选择
    strategy:
      - keep_source_file_as_single_include
      - sync_onepassword_core_domains_daily_from_official_support
      - keep_only_first_party_core_domains_and_update_endpoints
    notes:
      - 只自动保留 1Password 官方自有核心域名与更新/基础设施端点
      - 不自动并入 Watchtower、Fastmail、Brex、Privacy Cards 等第三方依赖域名
      - 客户端顺序应放在 proxy/gfw 前；工作白名单中也应作为显式放行入口

  - id: github-core-proxy
    target: rules/proxy/github_core_proxy.list
    purpose: GitHub 网页、API、Gist、Raw 与静态资源节点选择入口
    strategy:
      - manual_only
      - keep_scope_small_and_stable
      - separate_git_transport_from_https_core_services
    notes:
      - Git 传输继续由 direct/github_ssh_direct 承接；本入口只处理核心 HTTPS 业务
      - 默认显式覆盖 github.com、githubassets.com 与 githubusercontent.com，不扩展到 github.io
      - 客户端顺序应放在 proxy/gfw 前；Surge 侧仍建议在它前面保留 raw.githubusercontent.com 自举入口

  - id: polygon-rpc-proxy
    target: rules/proxy/polygon_rpc_proxy.list
    purpose: Polygon 主网 RPC 域名专项节点选择
    strategy:
      - keep_source_file_as_single_include
      - sync_chainlist_polygon_rpc_hosts_daily
      - retain_incremental_union_without_shrinking_scope
    notes:
      - 每日抓取 chainlist.org/rpcs.json 中 chainId=137 的最终 RPC 列表，并统一归一化为主机名规则
      - 上游快照采用只增不减策略，避免 Chainlist 日常波动导致既有覆盖面回撤
      - 客户端顺序应放在 proxy/gfw 前，避免被广谱代理入口提前命中
  - id: bsc-rpc-proxy
    target: rules/proxy/bsc_rpc_proxy.list
    purpose: BSC 主网 RPC 域名专项节点选择
    strategy:
      - keep_source_file_as_single_include
      - sync_chainlist_bsc_rpc_hosts_daily
      - retain_incremental_union_without_shrinking_scope
    notes:
      - 每日抓取 chainlist.org/rpcs.json 中 chainId=56 的最终 RPC 列表，并统一归一化为主机名规则
      - 仅覆盖 BNB Smart Chain Mainnet，不扩展到 opBNB 等其他 BNB 系链
      - 客户端顺序应放在 proxy/gfw 前，避免被广谱代理入口提前命中

  - id: google-public-dns-ipv4-proxy
    target: rules/proxy/google_public_dns_ipv4_proxy.list
    purpose: Google Public DNS 主 IPv4 端点专项节点选择
    strategy:
      - manual_only
      - keep_scope_small_and_stable
      - match_exact_ipv4_endpoint_without_port_binding
    notes:
      - 当前只精确匹配 8.8.8.8/32，不再绑定 53 端口，方便后续复用到其他端口探活
      - 不并入 rules/region/tw/google_tw.list，避免与 Google 台湾区域策略混用
      - 客户端顺序应放在 proxy/gfw 前，避免被广谱代理入口提前命中

  - id: hk-global-media
    target: rules/region/hk/global_media.list
    purpose: 国际流媒体走香港区域策略
    strategy:
      - include_upstream_first_then_local_core_fallback
      - include_blackmatrix7_global_media
    notes:
      - 香港节点通常更稳定、速度更快，适合 global media 场景
      - 香港地区内容更贴近华语用户，且支付方式更友好

  - id: tw-ai
    target: rules/region/tw/ai_tw.list
    purpose: AI 平台走台湾策略
    strategy:
      - include_upstream_first_then_local_keyword_fallback
      - include_blackmatrix7_openai_family
      - include_skywalkerji_coding_ai
      - include_accademia_grok
    notes:
      - 统一承接 OpenAI / Claude / Gemini / Copilot / Cursor / Grok / Trae / Windsurf / Augment 等 AI 平台
      - 本地额外保留更激进的 DOMAIN-KEYWORD 兜底，用于覆盖新前端、新二级域名与第三方聚合入口

  - id: tw-crypto
    target: rules/region/tw/crypto_tw.list
    purpose: 加密货币相关网站走台湾策略
    strategy:
      - keep_single_entry_file_for_client_stability
      - include_upstream_first_then_local_category_fallback
      - include_blackmatrix7_cryptocurrency
    notes:
      - 覆盖区块浏览器、交易所、DeFi 与预测市场；本地保留第三方未覆盖站点，如 g42.ai

  - id: hk-aws-ipv4
    target: rules/region/hk/hk_aws_ipv4.list
    purpose: AWS 香港 IPv4 路由入口
    strategy:
      - keep_source_file_as_single_include
      - sync_aws_ap_east_1_ipv4_daily

  - id: aws-tokyo-ipv4
    target: rules/region/jp/tokyo_aws_ipv4.list
    purpose: AWS 东京 IPv4 路由入口
    strategy:
      - keep_source_file_as_single_include
      - sync_aws_ap_northeast_1_ipv4_daily

  - id: aws-osaka-ipv4
    target: rules/region/jp/osaka_aws_ipv4.list
    purpose: AWS 大阪 IPv4 路由入口
    strategy:
      - keep_source_file_as_single_include
      - sync_aws_ap_northeast_3_ipv4_daily

  - id: aws-seoul-ipv4
    target: rules/region/kr/seoul_aws_ipv4.list
    purpose: AWS 首尔 IPv4 路由入口
    strategy:
      - keep_source_file_as_single_include
      - sync_aws_ap_northeast_2_ipv4_daily

  - id: aws-taipei-ipv4
    target: rules/region/tw/taipei_aws_ipv4.list
    purpose: AWS 台北 IPv4 路由入口
    strategy:
      - keep_source_file_as_single_include
      - sync_aws_ap_east_2_ipv4_daily

  - id: jp-domains
    target: rules/region/jp/domains_to_jp.list
    purpose: 日本区域域名策略入口
    strategy:
      - manual_only
      - keep_scope_small_and_stable
    notes:
      - 当前保持极小入口，按你自己的长期使用结果维护

  - id: jp-socks5-ipcidr
    target: rules/region/jp/jp_socks5_ipcidr.list
    purpose: 日本 SOCKS5 端点 CIDR 入口
    strategy:
      - manual_only
      - keep_scope_small_and_stable
    notes:
      - 当前以你自己维护的端点清单为准，不引入额外上游聚合

  - id: reject-plain-http
    target: rules/reject/plain_http_reject.list
    purpose: 禁止明文 HTTP 出站
    strategy:
      - manual_only
      - keep_scope_small_and_stable
    notes:
      - 仅对常见浏览器进程命中 DST-PORT,80，避免误伤微信等原生客户端

  - id: reject-os-update
    target: rules/reject/os_update_reject.list
    purpose: 操作系统更新禁用（Windows + Apple）
    strategy:
      - manual_only
      - keep_scope_small_and_stable
    notes:
      - 不引入上游订阅，避免第三方规则膨胀或误伤非更新流量

  - id: reject-wps
    target: rules/reject/wps_reject.list
    purpose: WPS 全量封网与后台组件广覆盖阻断
    strategy:
      - runtime_log_driven_and_upstream_curated
      - prefer_process_name_and_domain_suffix
    notes:
      - 默认接受 WPS 云文档、模板、账号、推送、升级与统计全部失效，不再追求低误伤
      - 候选来源以 anti-AD、blackmatrix7 与 GitHub 公开规则片段为主，并结合本机运行日志向域名树放大

  - id: reject-adspower
    target: rules/reject/adspower_reject.list
    purpose: AdsPower 隐私追踪与可安全阻断端点拦截
    strategy:
      - generated_from_rules_app_adspower_manifest
      - keep_single_source_of_truth
    notes:
      - 统一由 rules/app/adspower.txt 维护，不直接手改该源文件
      - 规则应与其他 reject 入口一起放在最前，先做阻断再做放行

  - id: adblock
    target: rules/reject/adblock_reject.list
    purpose: 轻量广告拦截
    strategy:
      - keep_small_and_readable
      - manual_only

runtime_plan:
  - id: shared-geoip-mmdb
    target: runtime/geodata/shared_country_mmdb
    purpose: Surge 与 Mihomo 共用的 GeoIP mmdb 上游来源
    strategy:
      - sync_selected_geodata_summary_to_rules_upstream_geodata
      - prefer_mihomo_official_default_provider_metacubex_meta_rules_dat
      - mirror_selected_country_mmdb_to_rulemesh_release_asset
      - pin_surge_geoip_maxmind_url_and_mihomo_geox_url_mmdb_to_same_country_mmdb
    notes:
      - 不把大体积 mmdb 二进制直接提交到本仓库，只登记上游选择与下载入口
      - 客户端统一引用本仓库 GitHub Release 镜像，不直接引用第三方仓库 release 链接
      - 如需切换来源，先更新 rules/upstream/geodata 快照、README、workflow 与两端模板，再同步本地私有 Surge / Mihomo 配置
