# 上游合并模板
# 当前实现已经从“手工拷贝合并”切换为“手写规则 + INCLUDE 上游快照”。

defaults:
  dedupe: true
  keep_comments: false
  normalize:
    trim_whitespace: true
    drop_blank_lines: true
  output_policy:
    source_layer_only: true
    client_layer_via_dist: true
  sync_policy:
    fetch_to_rules_upstream: true
    source_files_use_include: true
    manual_entries_first: true

merge_plan:
  - id: cn-direct
    target: rules/direct/cn_direct.list
    purpose: 中国大陆基础直连兜底，尽量避免国内站点误走代理
    strategy:
      - keep_manual_cn_overrides_first
      - include_loyalsoldier_direct_and_cncidr
      - include_acl4ssr_cn_supplements

  - id: microsoft-direct
    target: rules/direct/microsoft_direct.list
    purpose: Microsoft / OneDrive 直连
    strategy:
      - keep_process_rules_first
      - include_acl4ssr_onedrive_and_microsoft

  - id: bilibili-direct
    target: rules/direct/bilibili_direct.list
    purpose: 哔哩哔哩直连
    strategy:
      - keep_manual_domain_entries
      - include_acl4ssr_bilibili_variants

  - id: netease-direct
    target: rules/direct/netease_direct.list
    purpose: 网易直连
    strategy:
      - keep_manual_domain_entries
      - include_acl4ssr_netease_music

  - id: google-proxy
    target: rules/proxy/google.list
    purpose: Google / YouTube 代理
    strategy:
      - keep_manual_keyword_entries
      - include_acl4ssr_google_and_youtube

  - id: telegram-proxy
    target: rules/proxy/telegram.list
    purpose: Telegram 代理
    strategy:
      - keep_manual_domain_entries
      - include_loyalsoldier_telegram_cidr

  - id: gfw-proxy
    target: rules/proxy/gfw.list
    purpose: GFW 代理兜底
    strategy:
      - keep_manual_core_entries
      - include_loyalsoldier_gfw_and_tld_not_cn
      - include_acl4ssr_proxy_gfwlist

  - id: global-media
    target: rules/proxy/global_media.list
    purpose: 国际流媒体代理
    strategy:
      - keep_manual_core_entries
      - include_acl4ssr_proxy_media_and_netflix

  - id: tw-ai
    target: rules/region/tw/ai_tw.list
    purpose: AI 平台走台湾策略
    strategy:
      - keep_manual_keyword_entries
      - include_acl4ssr_openai

  - id: reject
    target: rules/reject/reject.list
    purpose: 强主观的拦截与限制规则
    strategy:
      - manual_only
    notes:
      - 这类规则与客户端兼容性耦合更强，继续只做本地维护

  - id: adblock
    target: rules/reject/adblock.list
    purpose: 轻量广告拦截
    strategy:
      - keep_small_and_readable
      - manual_only

  - id: device-srcip
    target: rules/device/srcip_pc01.list ~ rules/device/srcip_pc06.list
    purpose: 局域网设备源地址绑定
    strategy:
      - manual_single_source_of_truth
      - one_device_one_file
    notes:
      - 不建议从第三方拉取，直接维护本地源地址即可
