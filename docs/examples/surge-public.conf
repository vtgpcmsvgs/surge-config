RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/region/tw/ai_tw.list,"🇨🇳 台湾-自动选择"
RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/region/tw/crypto_tw.list,"🇨🇳 台湾-自动选择"
RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/region/jp/domains_to_jp.list,"🇯🇵 日本-自动选择"
RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/region/hk/telegram.list,"🇭🇰 香港-自动选择"
RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/region/hk/global_media.list,"🇭🇰 香港-自动选择"

# 3) 代理优先（决策：gfw 在 direct 前，先命中高置信代理规则）
RULE-SET,https://raw.githubusercontent.com/vtgpcmsvgs/rulemesh/main/dist/surge/rules/proxy/gfw.list,"🚀 节点选择"

# 4) 直连规则（完整使用 dist/surge/rules/direct）
