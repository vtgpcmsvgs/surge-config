# RuleMesh Mihomo 公开参考模板
# 适用场景：
# 1. 需要保留多订阅聚合、区域自动切换与完整规则顺序。
# 2. 需要公开分享配置结构，但不暴露真实机场订阅、控制器或设备分流信息。
# 3. 不承载私有 Surge 工作路由白名单特化。
#
# 使用前请把下面 3 个示例订阅地址替换成你自己的提供方链接：
# - https://example.com/subscriptions/provider-a.yaml
# - https://example.com/subscriptions/provider-b.yaml
# - https://example.com/subscriptions/provider-c.yaml

mixed-port: 7897
allow-lan: false
mode: rule

# > 日志级别
log-level: warning
global-ua: clash-verge/v2.2.0

# > All Hybrid 网络并发手动切换
tcp-concurrent: false

# > IPv6 支持（默认关闭）
ipv6: false

unified-delay: true
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

# > 跳过代理
# Mihomo 无 Surge 的全局 skip-proxy 等价字段，这里通过直连规则与 fake-ip-filter 覆盖主要场景。
dns:
  enable: true
  ipv6: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # > DNS 服务器
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # > DNS 劫持 / 代理服务器解析
  proxy-server-nameserver:
    - 8.8.8.8
    - 8.8.4.4
  # > Always Real IP Hosts
  fake-ip-filter:
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "xbox.*.microsoft.com"
    - "*.xboxlive.com"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"

proxy-providers:
  # 说明：下面这 3 个是公开模板里的占位订阅源。
  # interval: 21600 = 每 6 小时自动重新拉一次订阅。
  # health-check.interval: 300 = 每 5 分钟做一次测速，只影响延迟显示和自动组选路。
  provider_a:
    type: http
    url: "https://example.com/subscriptions/provider-a.yaml"
    path: ./proxy_provider/provider_a.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "A | "

  provider_b:
    type: http
    url: "https://example.com/subscriptions/provider-b.yaml"
    path: ./proxy_provider/provider_b.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "B | "

  provider_c:
    type: http
    url: "https://example.com/subscriptions/provider-c.yaml"
    path: ./proxy_provider/provider_c.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "C | "

proxy-groups:
  # 说明：本段自动组里的 interval: 300 = 每 5 分钟重新测速并择优一次，不是更新订阅。
  # 新手说明：这是总开关。日常只需要选它，内部再选“自动”或“手动”。
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇭🇰 香港-自动选择"
      - "🇨🇳 台湾-自动选择"
      - "🇸🇬 新加坡-自动选择"
      - "🇯🇵 日本-自动选择"
      - "🇺🇸 美国-自动选择"
      - "🇰🇷 韩国-自动选择"
      - "👋 手动切换"

  - name: "👋 手动切换"
    type: select
    use:
      - provider_a
      - provider_b
      - provider_c
    exclude-filter: "(?i)直接连接|联系我们"

  - name: "♻️ 自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇭🇰|香港|hong kong|\\bhk\\b|🇨🇳|台湾|taiwan|\\btw\\b|🇯🇵|日本|japan|\\bjp\\b|🇸🇬|新加坡|singapore|\\bsg\\b|🇺🇸|美国|united states|\\bus\\b|🇰🇷|韩|korea|\\bkr\\b"

  - name: "❌ 拒绝REJECT"
    type: select
    proxies:
      - REJECT

  - name: "🎯 直连DIRECT"
    type: select
    proxies:
      - DIRECT

  - name: "🇭🇰 香港-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 100
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇭🇰|香港|hong kong|\\bhk\\b"

  - name: "🇨🇳 台湾-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 100
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇨🇳|台湾|taiwan|\\btw\\b"

  - name: "🇯🇵 日本-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 150
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇯🇵|日本|japan|\\bjp\\b"

  - name: "🇰🇷 韩国-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 150
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇰🇷|韩|korea|\\bkr\\b"

  - name: "🇸🇬 新加坡-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 150
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇸🇬|新加坡|singapore|\\bsg\\b"

  - name: "🇺🇸 美国-自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 150
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇺🇸|美国|united states|\\bus\\b"

