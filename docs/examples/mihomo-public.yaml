    filter: "(?i)🇨🇳|台湾|taiwan|\\btw\\b"
    exclude-filter: "(?i)^(剩余流量|套餐到期|距离下次重置|过滤掉|expire date|traffic reset)|^(直接连接|FlyintPro)$|联系我们|\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)\\s*\\|\\s*\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)"

  - name: "🇯🇵 日本-自动选择"
