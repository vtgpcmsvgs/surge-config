rules:
  - RULE-SET,reject_adblock,REJECT
  - RULE-SET,reject_os_update,REJECT
  # 需要临时升级 Windows / macOS 时，可注释上一条拒绝规则，让后面的系统升级直连规则接管。
  - RULE-SET,reject_plain_http,REJECT
  - RULE-SET,reject_wps,REJECT
  - RULE-SET,reject_adspower,REJECT

  - RULE-SET,tw_google,🇨🇳 台湾-自动选择
  - RULE-SET,tw_ai,🇨🇳 台湾-自动选择
  - RULE-SET,tw_crypto,🇨🇳 台湾-自动选择
  - RULE-SET,jp_domains,🇯🇵 日本-自动选择
  - RULE-SET,hk_telegram,🇭🇰 香港-自动选择
  - RULE-SET,hk_global_media,🇭🇰 香港-自动选择

  # GitHub 仓库 SSH 定向直连必须放在 gfw 前，避免把整个 GitHub 放直连。
  - RULE-SET,direct_github_ssh,DIRECT

  # 4) AdsPower 细分直连（必须放在广谱代理前）
  - RULE-SET,direct_adspower,DIRECT

  # 5) AdsPower 细分节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_adspower,🚀 节点选择

  # 6) Polygon 主网 RPC 节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_polygon_rpc,🚀 节点选择

  # 7) BSC 主网 RPC 节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_bsc_rpc,🚀 节点选择

  # 8) Google Public DNS 主 IPv4 端点节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_google_public_dns_ipv4,🚀 节点选择

  # 9) 代理优先
  - RULE-SET,proxy_gfw,🚀 节点选择

  # 10) 直连规则
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - RULE-SET,direct_alicloud_hk_ssh,DIRECT
  - RULE-SET,direct_microsoft,DIRECT
  - RULE-SET,direct_macos_update,DIRECT
  - RULE-SET,direct_bytedance,DIRECT
  - RULE-SET,direct_netease,DIRECT
  - RULE-SET,direct_bilibili,DIRECT
  - RULE-SET,direct_cn,DIRECT

  # 11) IP 规则
  - RULE-SET,hk_aws_ipv4,🇭🇰 香港-自动选择,no-resolve
  - RULE-SET,jp_tokyo_aws_ipv4,🇯🇵 日本-自动选择,no-resolve
  - RULE-SET,jp_osaka_aws_ipv4,🇯🇵 日本-自动选择,no-resolve
  - RULE-SET,kr_seoul_aws_ipv4,🇰🇷 韩国-自动选择,no-resolve
  - RULE-SET,tw_taipei_aws_ipv4,🇨🇳 台湾-自动选择,no-resolve
  - RULE-SET,jp_socks5_ipcidr,🇯🇵 日本-自动选择,no-resolve

  # 12) 最终兜底
  - MATCH,🚀 节点选择

# 公开模板刻意不包含：
# 1. 真实机场订阅地址与供应商命名。
# 2. external-controller / secret 等控制面参数。
# 3. 按局域网源 IP 的设备分流。
# 4. 仅属于私有 Surge 工作路由文件的白名单 REJECT 结构。
