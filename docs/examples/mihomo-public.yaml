# RuleMesh Mihomo 公开参考模板
# 适用场景：
# 1. 需要保留多订阅聚合、区域自动切换与完整规则顺序。
# 2. 需要公开分享配置结构，但不暴露真实机场订阅、控制器或设备分流信息。
# 3. 不承载私有 Surge 工作路由白名单特化。
#
# 使用前请把下面 3 个示例订阅地址替换成你自己的提供方链接：
# - https://example.com/subscriptions/provider-a.yaml
# - https://example.com/subscriptions/provider-b.yaml
# - https://example.com/subscriptions/provider-c.yaml
# 如果客户端支持，请同时开启 TUN 模式；这份模板默认按 Tun + 嗅探 + 分流 DNS 设计。
# 如果把这份文件作为 Clash Verge Rev 的本地日常主配置导入，建议在客户端“订阅”页对该配置右键“编辑信息”，把“更新时间隔”设为 720 分钟。
# 这项 720 分钟设置不会写回 YAML，而是 Clash Verge Rev 保存在本机 profile 元数据里的外层定时重载设置；每台设备都要单独设置一次。
# Surge 公开模板里的 dns-mode / Host 复用 / 局域网代理入口开关只属于 Surge 运行时语义；Mihomo 继续按本文件与 docs/mihomo-tun-dns-methodology.md 独立维护。

mixed-port: 7897
allow-lan: false
mode: rule

# > 日志级别
log-level: warning
global-ua: clash-verge/v2.2.0

# > All Hybrid 网络并发手动切换
tcp-concurrent: false

# > IPv6 支持（默认关闭）
ipv6: false

unified-delay: true
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

# > GeoIP 数据库（固定为 mmdb，并经由本仓库 Release 镜像分发）
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  mmdb: "https://github.com/vtgpcmsvgs/rulemesh/releases/download/geoip-country-mmdb/country.mmdb"

# > Tun 全量接管
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# > 域名嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.lan"
    - "+.local"

# > DNS 分流
# 1) 默认把国际域名交给国外加密 DNS，避免 Google 等站点回到国内解析。
# 2) 仅把明确的国内直连域名集交给国内加密 DNS，不把所有 DIRECT 粗暴映射到国内 DNS。
# 3) 代理节点域名解析单独走 proxy-server-nameserver，避免规则 DNS 与节点 DNS 互相缠绕。
dns:
  enable: true
  ipv6: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # > DNS 服务器引导解析
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  # > 国内直连域名优先交给国内加密 DNS
  nameserver-policy:
    "rule-set:direct_cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:direct_bilibili":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:direct_netease":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:direct_bytedance":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  # > 默认国外加密 DNS
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  # > 直连出口解析
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  # > 代理节点域名解析
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  # > 国外备用解析
  fallback:
    - https://1.0.0.1/dns-query
    - https://dns.quad9.net/dns-query
  # > Always Real IP Hosts
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.home.arpa"
    - "localhost"
    - "www.msftconnecttest.com"
    - "msftconnecttest.com"
    - "www.msftncsi.com"
    - "msftncsi.com"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "xbox.*.microsoft.com"
    - "*.xboxlive.com"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"

proxy-providers:
  # 说明：下面这 3 个是公开模板里的占位订阅源。
  # interval: 21600 = 每 6 小时自动重新拉一次订阅。
  # health-check.interval: 300 = 每 5 分钟做一次测速，只影响延迟显示和自动组选路。
  # 如果在 Clash Verge Rev 里把这份文件作为本地配置长期使用，建议再配合客户端侧的 720 分钟“更新时间隔”做外层定时重载。
  # 维护约定：YAML 里的 interval 仍负责 Mihomo 内核层更新；Clash Verge Rev 的 720 分钟只作为保底保险，不替代这里的 interval。
  provider_a:
    type: http
    url: "https://example.com/subscriptions/provider-a.yaml"
    path: ./proxy_provider/provider_a.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "A | "

  provider_b:
    type: http
    url: "https://example.com/subscriptions/provider-b.yaml"
    path: ./proxy_provider/provider_b.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "B | "

  provider_c:
    type: http
    url: "https://example.com/subscriptions/provider-c.yaml"
    path: ./proxy_provider/provider_c.yaml
    interval: 21600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: false
      expected-status: 204
    override:
      additional-prefix: "C | "

proxy-groups:
  # 说明：本段自动组里的 interval: 300 = 每 5 分钟重新测速并择优一次，不是更新订阅。
  # 新手说明：这是总开关。日常只需要选它，内部再选“自动”或“手动”。
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇭🇰 香港-自动选择"
      - "🇨🇳 台湾-自动选择"
      - "🇸🇬 新加坡-自动选择"
      - "🇯🇵 日本-自动选择"
      - "🇺🇸 美国-自动选择"
      - "🇰🇷 韩国-自动选择"
      - "👋 手动切换"

  - name: "👋 手动切换"
    type: select
    use:
      - provider_a
      - provider_b
      - provider_c
    # 维护约定：状态/提示项按前缀匹配，独立占位项按全名精确匹配，流量统计提示按数值模式匹配；所有相关代理组保持同一套条件。
    exclude-filter: "(?i)^(剩余流量|套餐到期|距离下次重置|过滤掉|expire date|traffic reset)|^(直接连接|FlyintPro)$|联系我们|\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)\\s*\\|\\s*\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)"

  - name: "♻️ 自动选择"
    type: url-test
    url: "http://www.google.com/generate_204"
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: false
    use:
      - provider_a
      - provider_b
      - provider_c
    filter: "(?i)🇭🇰|香港|hong kong|\\bhk\\b|🇨🇳|台湾|taiwan|\\btw\\b|🇯🇵|日本|japan|\\bjp\\b|🇸🇬|新加坡|singapore|\\bsg\\b|🇺🇸|美国|united states|\\bus\\b|🇰🇷|韩|korea|\\bkr\\b"
    exclude-filter: "(?i)^(剩余流量|套餐到期|距离下次重置|过滤掉|expire date|traffic reset)|^(直接连接|FlyintPro)$|联系我们|\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)\\s*\\|\\s*\\d+(?:\\.\\d+)?\\s*(?:[kmgt]b?|b)"

  - name: "🇭🇰 香港-自动选择"
    type: url-test
